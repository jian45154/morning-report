name: Morning Report

on:
  schedule:
    # 22:00 UTC is 08:00 in Australia/Sydney during standard time.
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[tts]"

      - name: Send morning report
        run: python -m morning_report --projects config/projects.example.json --out-dir out --tts-provider edge --send-discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

